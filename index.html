<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUHAIL ELITE | سهيل إيليت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #0A1931;
            --black: #050505;
            --gold: #C5A059;
            --white: #ffffff;
            --dark-card: #0d1b2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { background-color: #1a1a1a; display: flex; justify-content: center; color: var(--white); }

        .app-container {
            width: 100%; max-width: 430px; background-color: var(--black);
            min-height: 100vh; position: relative; padding-bottom: 90px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        /* الهيدر */
        header {
            background: linear-gradient(180deg, var(--navy) 0%, var(--black) 100%);
            padding: 30px 20px; text-align: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        }

        .logo { height: 60px; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.5)); }

        /* البحث */
        .search-bar {
            margin: 15px 20px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold); border-radius: 10px;
            padding: 10px; display: flex; align-items: center; color: var(--gold);
        }

        /* شبكة المنتجات */
        .products-section { padding: 20px; }
        .section-title { font-size: 1.2rem; color: var(--gold); margin-bottom: 20px; border-right: 4px solid var(--gold); padding-right: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .card {
            background: var(--dark-card); border-radius: 15px; overflow: hidden;
            border: 1px solid #1a2a44; transition: 0.3s;
        }

        .card img { width: 100%; height: 180px; object-fit: cover; }

        .card-info { padding: 12px; text-align: center; }
        .card-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; height: 40px; display: block; }
        .card-price { color: var(--gold); font-weight: 900; display: block; margin-bottom: 10px; }

        .buy-btn {
            background: var(--gold); color: var(--black); border: none;
            padding: 8px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer;
        }

        /* شريط التنقل */
        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 430px;
            background: rgba(5, 5, 5, 0.98); display: flex;
            justify-content: space-around; padding: 15px 0; border-top: 1px solid #222;
        }

        .nav-link { color: #666; text-align: center; font-size: 0.8rem; text-decoration: none; }
        .nav-link.active { color: var(--gold); }
        .nav-link i { display: block; font-size: 1.4rem; margin-bottom: 5px; }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <img src="https://files.catbox.moe/p9o7e0.png" class="logo" alt="SUHAIL ELITE">
    </header>

    <div class="search-bar">
        <i class="fas fa-search" style="margin-left: 10px;"></i>
        <span>ابحث عن عترك المفضل...</span>
    </div>

    <div class="products-section">
        <h2 class="section-title">مجموعة التميز الملكية</h2>
        
        <div class="grid">
            <div class="card">
                <img src="https://files.catbox.moe/v6p5e7.png" alt="Suhail Elite">
                <div class="card-info">
                    <span class="card-name">سهيل - إصدار التميز</span>
                    <span class="card-price">450 ر.س</span>
                    <button class="buy-btn">أضف للسلة</button>
                </div>
            </div>

            <div class="card">
                <img src="https://files.catbox.moe/kixh2j.png" alt="Suhail Elite">
                <div class="card-info">
                    <span class="card-name">إصدار النخبة الأسود</span>
                    <span class="card-price">380 ر.س</span>
                    <button class="buy-btn">أضف للسلة</button>
                </div>
            </div>

            <div class="card">
                <img src="https://files.catbox.moe/1o9286.png" alt="Suhail Elite">
                <div class="card-info">
                    <span class="card-name">المجموعة الكاملة (3 قطع)</span>
                    <span class="card-price">1100 ر.س</span>
                    <button class="buy-btn">أضف للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <a href="#" class="nav-link active"><i class="fas fa-home"></i>الرئيسية</a>
        <a href="#" class="nav-link"><i class="fas fa-shopping-bag"></i>السلة</a>
        <a href="#" class="nav-link"><i class="fas fa-info-circle"></i>من نحن</a>
        <a href="#" class="nav-link"><i class="fas fa-user"></i>حسابي</a>
    </nav>
</div>

</body>
</html>
