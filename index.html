<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUHAIL ELITE | سهيل إيليت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #0A1931;
            --black: #050505;
            --gold: #C5A059;
            --white: #ffffff;
            --card-bg: #111d33;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            color: var(--white);
        }

        .app {
            width: 100%;
            max-width: 430px;
            background-color: var(--black);
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* الهيدر مع اللوجو */
        header {
            background: linear-gradient(180deg, var(--navy) 0%, var(--black) 100%);
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header img {
            height: 55px;
            filter: drop-shadow(0 0 8px rgba(197, 160, 89, 0.4));
        }

        /* الأقسام */
        .content { padding: 20px; }
        .section-title {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 20px;
            border-right: 5px solid var(--gold);
            padding-right: 15px;
            font-weight: 900;
        }

        /* كروت العطور */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .item {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1e2d4d;
            transition: transform 0.2s;
        }

        .item:active { transform: scale(0.95); }

        .item img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-bottom: 1px solid #1e2d4d;
        }

        .item-info { padding: 12px; text-align: center; }
        .item-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; height: 45px; display: block; }
        .item-price { color: var(--gold); font-weight: 900; font-size: 1.1rem; display: block; margin-bottom: 12px; }

        .add-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px;
            width: 100%;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover { background: var(--gold); color: var(--black); }

        /* شريط التنقل */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 430px;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #222;
            z-index: 1000;
        }

        .nav-item {
            color: #666;
            text-align: center;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 5px; }

        /* صفحة السلة */
        #cart-view { display: none; padding: 20px; }
        .cart-empty { text-align: center; margin-top: 100px; color: #444; }

    </style>
</head>
<body>

<div class="app">
    <header>
        <img src="https://i.ibb.co/p9o7e0/logo.png" onerror="this.src='https://via.placeholder.com/200x80/0A1931/C5A059?text=SUHAIL+ELITE'" alt="SUHAIL ELITE">
    </header>

    <div id="home-view" class="content">
        <h2 class="section-title">مجموعة التميز الملكية</h2>
        
        <div class="grid">
            <div class="item">
                <img src="https://i.ibb.co/v6p5e7/prod1.png" onerror="this.src='https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400'" alt="عطر">
                <div class="item-info">
                    <span class="item-name">سهيل - إصدار التميز (عطرين)</span>
                    <span class="item-price">450 ر.س</span>
                    <button class="add-btn" onclick="addToCart('إصدار التميز')">أضف للسلة</button>
                </div>
            </div>

            <div class="item">
                <img src="https://i.ibb.co/kixh2j/prod2.png" onerror="this.src='https://images.unsplash.com/photo-1541643600914-78b084683601?w=400'" alt="عطر">
                <div class="item-info">
                    <span class="item-name">إصدار النخبة الأسود</span>
                    <span class="item-price">380 ر.س</span>
                    <button class="add-btn" onclick="addToCart('النخبة الأسود')">أضف للسلة</button>
                </div>
            </div>

            <div class="item">
                <img src="https://i.ibb.co/1o9286/prod3.png" onerror="this.src='https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400'" alt="عطر">
                <div class="item-info">
                    <span class="item-name">المجموعة الكاملة (3 قطع)</span>
                    <span class="item-price">1100 ر.س</span>
                    <button class="add-btn" onclick="addToCart('المجموعة الكاملة')">أضف للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-view">
        <h2 class="section-title">سلة المشتريات</h2>
        <div class="cart-empty">
            <i class="fas fa-shopping-basket" style="font-size: 4rem; margin-bottom: 20px;"></i>
            <p>السلة فارغة حالياً..</p>
        </div>
    </div>

    <nav>
        <a href="#" class="nav-item active" onclick="showHome()">
            <i class="fas fa-home"></i>الرئيسية
        </a>
        <a href="#" class="nav-item" onclick="showCart()">
            <i class="fas fa-shopping-bag"></i>السلة
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-info-circle"></i>من نحن
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-user-alt"></i>حسابي
        </a>
    </nav>
</div>

<script>
    function showCart() {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('cart-view').style.display = 'block';
        updateNav(1);
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('cart-view').style.display = 'none';
        updateNav(0);
    }

    function updateNav(index) {
        let items = document.querySelectorAll('.nav-item');
        items.forEach(item => item.classList.remove('active'));
        items[index].classList.add('active');
    }

    function addToCart(name) {
        alert("تم إضافة " + name + " إلى السلة بنجاح!");
    }
</script>

</body>
</html>
