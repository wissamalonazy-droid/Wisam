<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUHAIL ELITE | متجر الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --royal-black: #050505;
            --navy-blue: #0A1931;
            --gold: #C5A059;
            --white: #FFFFFF;
        }

        body {
            margin: 0;
            background-color: #111;
            font-family: 'Cairo', sans-serif;
            color: var(--white);
            display: flex;
            justify-content: center;
        }

        .phone-mockup {
            width: 100%;
            max-width: 420px;
            background-color: var(--royal-black);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* الهيدر مع اللوجو اللي رفعته */
        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #0A1931, #050505);
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }

        .header img {
            height: 50px;
            filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.3));
        }

        /* قسم المنتجات */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .product-card {
            background: #0d1b2a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1b263b;
            transition: 0.3s;
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
            text-align: center;
        }

        .product-info h4 {
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #e0e1dd;
        }

        .price {
            color: var(--gold);
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .btn-add {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 100%;
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* شريط التنقل السفلي */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            background: #050505;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #1b263b;
        }

        .nav-item {
            color: #777;
            text-align: center;
            font-size: 0.75rem;
            text-decoration: none;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item i {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

<div class="phone-mockup">
    <header class="header">
        <img src="https://files.catbox.moe/p9o7e0.png" alt="SUHAIL ELITE LOGO">
    </header>

    <div style="padding: 15px; text-align: center;">
        <h2 style="color: var(--gold); font-size: 1.2rem;">مجموعة التميز الملكية</h2>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <img src="https://files.catbox.moe/v6p5e7.png" alt="عطور سهيل">
            <div class="product-info">
                <h4>سهيل - ثنائي الفخامة</h4>
                <span class="price">550 ر.س</span>
                <button class="btn-add">أضف للسلة</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://files.catbox.moe/kixh2j.png" alt="عطر مع العلبة">
            <div class="product-info">
                <h4>إصدار النخبة الأسود</h4>
                <span class="price">420 ر.س</span>
                <button class="btn-add">أضف للسلة</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://files.catbox.moe/1o9286.png" alt="مجموعة عطور">
            <div class="product-info">
                <h4>المجموعة الكاملة</h4>
                <span class="price">1,100 ر.س</span>
                <button class="btn-add">أضف للسلة</button>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>الرئيسية</a>
        <a href="#" class="nav-item"><i class="fas fa-shopping-basket"></i>السلة</a>
        <a href="#" class="nav-item"><i class="fas fa-info-circle"></i>من نحن</a>
        <a href="#" class="nav-item"><i class="fas fa-user-circle"></i>حسابي</a>
    </nav>
</div>

</body>
</html>
