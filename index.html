<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجل — لغة المتاجر</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #00d4aa;
    --warning: #ffb347;
    --error: #ff6b6b;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘IBM Plex Sans Arabic’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* خلفية متحركة */
body::before {
content: ‘’;
position: fixed;
top: -50%;
left: -50%;
width: 200%;
height: 200%;
background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.06) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(0,212,170,0.04) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

.container {
max-width: 1400px;
margin: 0 auto;
padding: 0 24px;
position: relative;
z-index: 1;
}

/* الهيدر */
header {
padding: 32px 0 24px;
border-bottom: 1px solid var(–border);
margin-bottom: 32px;
}

.header-inner {
display: flex;
align-items: center;
justify-content: space-between;
}

.logo {
display: flex;
align-items: center;
gap: 12px;
}

.logo-icon {
width: 42px;
height: 42px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
font-weight: 700;
color: white;
font-family: ‘IBM Plex Sans Arabic’, sans-serif;
box-shadow: 0 0 20px rgba(108,99,255,0.3);
}

.logo-text {
font-size: 28px;
font-weight: 700;
background: linear-gradient(135deg, var(–accent), var(–accent2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: -0.5px;
}

.logo-sub {
font-size: 13px;
color: var(–muted);
margin-top: 2px;
}

.badge {
background: rgba(108,99,255,0.15);
border: 1px solid rgba(108,99,255,0.3);
color: var(–accent);
padding: 6px 14px;
border-radius: 20px;
font-size: 13px;
font-weight: 500;
}

/* المحرر الرئيسي */
.editor-layout {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 24px;
}

.panel {
background: var(–card);
border: 1px solid var(–border);
border-radius: 16px;
overflow: hidden;
}

.panel-header {
padding: 14px 20px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
background: rgba(255,255,255,0.02);
}

.panel-title {
font-size: 14px;
font-weight: 600;
color: var(–muted);
display: flex;
align-items: center;
gap: 8px;
}

.dot {
width: 8px;
height: 8px;
border-radius: 50%;
}

.dot-purple { background: var(–accent); box-shadow: 0 0 6px var(–accent); }
.dot-green { background: var(–accent2); box-shadow: 0 0 6px var(–accent2); }

.run-btn {
background: linear-gradient(135deg, var(–accent), #8b82ff);
color: white;
border: none;
padding: 8px 20px;
border-radius: 8px;
font-size: 13px;
font-weight: 600;
cursor: pointer;
font-family: ‘IBM Plex Sans Arabic’, sans-serif;
transition: all 0.2s;
display: flex;
align-items: center;
gap: 6px;
}

.run-btn:hover {
transform: translateY(-1px);
box-shadow: 0 4px 16px rgba(108,99,255,0.4);
}

.run-btn:active { transform: translateY(0); }

#editor {
width: 100%;
min-height: 380px;
background: transparent;
border: none;
outline: none;
padding: 20px;
color: var(–text);
font-family: ‘JetBrains Mono’, monospace;
font-size: 14px;
line-height: 1.8;
resize: none;
direction: rtl;
}

#editor::placeholder { color: var(–muted); }

/* نتيجة الـ Parser */
#output {
padding: 20px;
min-height: 380px;
overflow-y: auto;
}

.output-empty {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 340px;
color: var(–muted);
gap: 12px;
}

.output-empty .icon { font-size: 40px; opacity: 0.4; }
.output-empty p { font-size: 14px; }

/* بطاقات النتائج */
.result-section {
margin-bottom: 16px;
animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.result-title {
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(–muted);
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 6px;
}

.result-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 14px 16px;
}

.result-card.store-card {
border-color: rgba(108,99,255,0.3);
background: rgba(108,99,255,0.05);
}

.result-card.product-card {
border-color: rgba(0,212,170,0.3);
background: rgba(0,212,170,0.05);
margin-bottom: 8px;
}

.result-card.discount-card {
border-color: rgba(255,179,71,0.3);
background: rgba(255,179,71,0.05);
margin-bottom: 8px;
}

.result-card.shipping-card {
border-color: rgba(255,107,107,0.3);
background: rgba(255,107,107,0.05);
margin-bottom: 8px;
}

.result-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 4px 0;
font-size: 13px;
}

.result-key {
color: var(–muted);
font-size: 12px;
}

.result-val {
color: var(–text);
font-weight: 500;
}

.result-val.price { color: var(–accent2); font-family: ‘JetBrains Mono’, monospace; }
.result-val.tag {
background: rgba(108,99,255,0.2);
color: var(–accent);
padding: 2px 8px;
border-radius: 4px;
font-size: 12px;
}

/* الأخطاء */
.error-msg {
background: rgba(255,107,107,0.1);
border: 1px solid rgba(255,107,107,0.3);
border-radius: 10px;
padding: 12px 16px;
color: var(–error);
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
}

/* JSON View */
.json-panel {
margin-top: 20px;
}

.json-toggle {
background: transparent;
border: 1px solid var(–border);
color: var(–muted);
padding: 8px 16px;
border-radius: 8px;
font-size: 12px;
cursor: pointer;
font-family: ‘IBM Plex Sans Arabic’, sans-serif;
transition: all 0.2s;
margin-bottom: 12px;
}

.json-toggle:hover {
border-color: var(–accent);
color: var(–accent);
}

#json-output {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 16px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
line-height: 1.7;
color: #a8b5c8;
direction: ltr;
text-align: left;
display: none;
white-space: pre-wrap;
overflow-x: auto;
}

#json-output .key { color: #6c63ff; }
#json-output .string { color: #00d4aa; }
#json-output .number { color: #ffb347; }

/* الأمثلة السريعة */
.examples-bar {
display: flex;
gap: 10px;
margin-bottom: 20px;
flex-wrap: wrap;
}

.example-btn {
background: var(–card);
border: 1px solid var(–border);
color: var(–text);
padding: 8px 16px;
border-radius: 8px;
font-size: 13px;
cursor: pointer;
font-family: ‘IBM Plex Sans Arabic’, sans-serif;
transition: all 0.2s;
}

.example-btn:hover {
border-color: var(–accent);
background: rgba(108,99,255,0.1);
color: var(–accent);
}

/* إحصائيات */
.stats-bar {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 12px;
margin-bottom: 24px;
}

.stat-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
padding: 16px 20px;
display: flex;
align-items: center;
gap: 12px;
}

.stat-icon {
font-size: 22px;
width: 40px;
height: 40px;
display: flex;
align-items: center;
justify-content: center;
border-radius: 10px;
}

.stat-icon.purple { background: rgba(108,99,255,0.15); }
.stat-icon.green { background: rgba(0,212,170,0.15); }
.stat-icon.orange { background: rgba(255,179,71,0.15); }
.stat-icon.red { background: rgba(255,107,107,0.15); }

.stat-num {
font-size: 22px;
font-weight: 700;
font-family: ‘JetBrains Mono’, monospace;
line-height: 1;
}

.stat-num.purple { color: var(–accent); }
.stat-num.green { color: var(–accent2); }
.stat-num.orange { color: var(–warning); }
.stat-num.red { color: var(–error); }

.stat-label { font-size: 12px; color: var(–muted); margin-top: 3px; }

/* Syntax highlighting in editor */
.editor-wrapper { position: relative; }

@media (max-width: 768px) {
.editor-layout { grid-template-columns: 1fr; }
.stats-bar { grid-template-columns: repeat(2, 1fr); }
.header-inner { flex-direction: column; gap: 12px; align-items: flex-start; }
}
</style>

<script>
// ============= PARSER =============
function parseMajal(code) {
  const lines = code.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
  
  const result = {
    متجر: null,
    منتجات: [],
    خصومات: [],
    شحن: [],
    عملاء: [],
    طلبات: [],
    أخطاء: []
  };

  let currentBlock = null;
  let currentObj = {};

  const saveBlock = () => {
    if (!currentBlock || Object.keys(currentObj).length === 0) return;
    if (currentBlock === 'متجر') result.متجر = { ...currentObj };
    else if (currentBlock === 'منتج') result.منتجات.push({ ...currentObj });
    else if (currentBlock === 'خصم') result.خصومات.push({ ...currentObj });
    else if (currentBlock === 'شحن') result.شحن.push({ ...currentObj });
    else if (currentBlock === 'عميل') result.عملاء.push({ ...currentObj });
    else if (currentBlock === 'طلب') result.طلبات.push({ ...currentObj });
    currentObj = {};
  };

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // سطور بصيغة "مفتاح: قيمة"
    if (line.includes(':')) {
      const colonIdx = line.indexOf(':');
      const key = line.substring(0, colonIdx).trim();
      const val = line.substring(colonIdx + 1).trim();

      // تحديد نوع البلوك
      const blockTypes = ['منتج', 'خصم', 'شحن', 'عميل', 'طلب'];
      const storeKeys = ['اسم المتجر'];

      if (storeKeys.includes(key)) {
        saveBlock();
        currentBlock = 'متجر';
        currentObj = { الاسم: val };
      } else if (blockTypes.includes(key)) {
        saveBlock();
        currentBlock = key;
        currentObj = { الاسم: val };
      } else {
        // معالجة خطوط متعددة القيم (مفصولة بـ |)
        if (val.includes('|')) {
          const parts = val.split('|').map(p => p.trim());
          parts.forEach(part => {
            if (part.includes('=')) {
              const [k, v] = part.split('=').map(s => s.trim());
              currentObj[k] = isNaN(v) ? v : Number(v);
            } else if (part.includes(':')) {
              const [k, v] = part.split(':').map(s => s.trim());
              currentObj[k] = isNaN(v) ? v : Number(v);
            } else {
              currentObj['نوع'] = part;
            }
          });
        } else {
          currentObj[key] = isNaN(val) ? val : Number(val);
        }
      }
    }
  }

  saveBlock();
  return result;
}

// ============= RENDERER =============
function renderResult(data) {
  const out = document.getElementById('output');
  
  if (!data.متجر && data.منتجات.length === 0 && data.خصومات.length === 0 && data.شحن.length === 0) {
    out.innerHTML = `<div class="error-msg">⚠️ لم يتم العثور على بيانات صحيحة. تأكد من صيغة الكود.</div>`;
    return;
  }

  let html = '';

  // المتجر
  if (data.متجر) {
    html += `<div class="result-section">
      <div class="result-title"><span>🏪</span> معلومات المتجر</div>
      <div class="result-card store-card">`;
    for (const [k, v] of Object.entries(data.متجر)) {
      html += `<div class="result-row">
        <span class="result-key">${k}</span>
        <span class="result-val tag">${v}</span>
      </div>`;
    }
    html += `</div></div>`;
  }

  // المنتجات
  if (data.منتجات.length > 0) {
    html += `<div class="result-section">
      <div class="result-title"><span>📦</span> المنتجات (${data.منتجات.length})</div>`;
    data.منتجات.forEach(p => {
      html += `<div class="result-card product-card">`;
      for (const [k, v] of Object.entries(p)) {
        const isPrice = k === 'السعر' || k === 'سعر';
        html += `<div class="result-row">
          <span class="result-key">${k}</span>
          <span class="result-val ${isPrice ? 'price' : ''}">${v}${isPrice ? ' ر.س' : ''}</span>
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  // الخصومات
  if (data.خصومات.length > 0) {
    html += `<div class="result-section">
      <div class="result-title"><span>🏷️</span> الخصومات (${data.خصومات.length})</div>`;
    data.خصومات.forEach(d => {
      html += `<div class="result-card discount-card">`;
      for (const [k, v] of Object.entries(d)) {
        html += `<div class="result-row">
          <span class="result-key">${k}</span>
          <span class="result-val">${v}</span>
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  // الشحن
  if (data.شحن.length > 0) {
    html += `<div class="result-section">
      <div class="result-title"><span>🚚</span> خيارات الشحن (${data.شحن.length})</div>`;
    data.شحن.forEach(s => {
      html += `<div class="result-card shipping-card">`;
      for (const [k, v] of Object.entries(s)) {
        html += `<div class="result-row">
          <span class="result-key">${k}</span>
          <span class="result-val">${v}</span>
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  out.innerHTML = html;

  // تحديث الإحصائيات
  document.getElementById('s-stores').textContent = data.متجر ? 1 : 0;
  document.getElementById('s-products').textContent = data.منتجات.length;
  document.getElementById('s-discounts').textContent = data.خصومات.length;
  document.getElementById('s-shipping').textContent = data.شحن.length;

  // JSON
  const jsonEl = document.getElementById('json-output');
  const clean = JSON.parse(JSON.stringify(data, (k, v) => k === 'أخطاء' ? undefined : v));
  jsonEl.textContent = JSON.stringify(clean, null, 2);
}

function parseCode() {
  const code = document.getElementById('editor').value;
  if (!code.trim()) {
    document.getElementById('output').innerHTML = `<div class="error-msg">⚠️ الكود فارغ!</div>`;
    return;
  }
  const data = parseMajal(code);
  renderResult(data);
}

function toggleJSON() {
  const el = document.getElementById('json-output');
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// ============= EXAMPLES =============
const examples = {
  basic: `# متجر بسيط

المدة: نفس اليوم

الشرط: فوق 300 ريال
السعر: 0`,

  fashion: `# متجر أزياء فاخر

منتج: فستان سهرة

منتج: ساعة كلاسيك

};

function loadExample(name) {
  document.getElementById('editor').value = examples[name];
  parseCode();
}

function clearEditor() {
  document.getElementById('editor').value = '';
  document.getElementById('output').innerHTML = `<div class="output-empty"><div class="icon">⚡</div><p>اكتب كود واضغط تشغيل</p></div>`;
  document.getElementById('s-stores').textContent = 0;
  document.getElementById('s-products').textContent = 0;
  document.getElementById('s-discounts').textContent = 0;
  document.getElementById('s-shipping').textContent = 0;
}

// تشغيل بـ Ctrl+Enter
document.getElementById('editor').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') parseCode();
});
</script>
